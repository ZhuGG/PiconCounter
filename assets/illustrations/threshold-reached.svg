<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Repère atteint</title>
  <desc id="desc">Illustration calme avec jauge, pause et eau, sans dramatisation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160c08"/>
      <stop offset="1" stop-color="#321507"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe59a"/>
      <stop offset="1" stop-color="#d64b55"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c6fff0"/>
      <stop offset="1" stop-color="#75d59d"/>
    </linearGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="720" height="460" rx="48" fill="url(#bg)"/>
  <circle cx="546" cy="114" r="92" fill="#f6ce72" opacity=".14" filter="url(#blur)"/>
  <circle cx="190" cy="346" r="88" fill="#75d59d" opacity=".12" filter="url(#blur)"/>
  <g transform="translate(124 76)">
    <rect x="0" y="0" width="472" height="300" rx="38" fill="#fff8e7" opacity=".08" stroke="#f6ce72" stroke-opacity=".22"/>
    <g transform="translate(62 54)">
      <circle cx="96" cy="96" r="84" fill="none" stroke="#fff8e7" stroke-opacity=".14" stroke-width="18"/>
      <path d="M96 12a84 84 0 1 1-70 130" fill="none" stroke="url(#warn)" stroke-width="18" stroke-linecap="round"/>
      <path d="M72 70v52M120 70v52" stroke="#fff8e7" stroke-width="18" stroke-linecap="round"/>
      <text x="96" y="190" text-anchor="middle" fill="#e1c18d" font-family="Trebuchet MS, Arial, sans-serif" font-size="20" font-weight="800">pause</text>
    </g>
    <g transform="translate(292 80)">
      <path d="M58 0s58 62 58 108a58 58 0 0 1-116 0C0 62 58 0 58 0Z" fill="url(#water)" opacity=".9"/>
      <path d="M34 110c14 16 36 20 56 8" fill="none" stroke="#fff8e7" stroke-width="10" stroke-linecap="round" opacity=".8"/>
      <text x="58" y="174" text-anchor="middle" fill="#e1c18d" font-family="Trebuchet MS, Arial, sans-serif" font-size="20" font-weight="800">eau ≠ compensation</text>
    </g>
  </g>
  <text x="360" y="414" text-anchor="middle" fill="#fff8e7" font-family="Trebuchet MS, Arial, sans-serif" font-size="24" font-weight="900">Repère atteint · ralentir et faire une pause</text>
</svg>